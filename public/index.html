<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express API Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2rem;
            color: #38bdf8;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .status-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }

        .status-card h2 {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #475569;
            animation: pulse 2s infinite;
        }

        .status-dot.online {
            background: #22c55e;
        }

        .status-dot.offline {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .status-text {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .hello-message {
            margin-top: 1rem;
            padding: 1rem;
            background: #0f172a;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            color: #38bdf8;
            font-size: 0.95rem;
            word-break: break-word;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .info-item {
            background: #0f172a;
            padding: 1rem;
            border-radius: 8px;
        }

        .info-item label {
            display: block;
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .info-item span {
            font-size: 1rem;
            color: #e2e8f0;
            font-weight: 500;
        }

        /* API Dashboard */
        .endpoints-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .endpoint {
            background: #0f172a;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .endpoint-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .method-badge {
            background: #22c55e;
            color: #0f172a;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            font-family: monospace;
        }

        .endpoint-path {
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .endpoint-desc {
            font-size: 0.85rem;
            color: #64748b;
        }

        .test-btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .test-btn:hover {
            background: #7dd3fc;
        }

        .test-btn:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .response-box {
            width: 100%;
            margin-top: 0.75rem;
            padding: 0.75rem 1rem;
            background: #1e293b;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #38bdf8;
            display: none;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid #334155;
        }

        .response-box.visible {
            display: block;
        }

        .response-box.error {
            color: #ef4444;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: #475569;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Express API</h1>
            <p>Deployed on Amazon EKS</p>
        </header>

        <!-- Service Status -->
        <div class="status-card">
            <h2>Service Status</h2>
            <div class="status-row">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">Checking...</span>
            </div>
            <div class="hello-message" id="helloMessage">Loading...</div>
            <div class="info-grid">
                <div class="info-item">
                    <label>Platform</label>
                    <span>Amazon EKS</span>
                </div>
                <div class="info-item">
                    <label>Runtime</label>
                    <span>Node.js 20</span>
                </div>
                <div class="info-item">
                    <label>Port</label>
                    <span>3000</span>
                </div>
                <div class="info-item">
                    <label>Replicas</label>
                    <span>2</span>
                </div>
            </div>
        </div>

        <!-- API Dashboard -->
        <div class="status-card">
            <h2>API Endpoints</h2>
            <div class="endpoints-list">
                <div class="endpoint">
                    <div class="endpoint-info">
                        <span class="method-badge">GET</span>
                        <span class="endpoint-path">/health</span>
                        <span class="endpoint-desc">Health check</span>
                    </div>
                    <button class="test-btn" onclick="testEndpoint('/health', 'response-health')">Test</button>
                    <div class="response-box" id="response-health"></div>
                </div>
                <div class="endpoint">
                    <div class="endpoint-info">
                        <span class="method-badge">GET</span>
                        <span class="endpoint-path">/api/hello</span>
                        <span class="endpoint-desc">Hello message</span>
                    </div>
                    <button class="test-btn" onclick="testEndpoint('/api/hello', 'response-hello')">Test</button>
                    <div class="response-box" id="response-hello"></div>
                </div>
            </div>
        </div>

        <footer>
            <p>Express API v1.0.0</p>
        </footer>
    </div>

    <script>
        async function checkStatus() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                document.getElementById('statusDot').classList.add('online');
                document.getElementById('statusText').textContent = 'Online';

                const helloRes = await fetch('/api/hello');
                const helloData = await helloRes.json();
                document.getElementById('helloMessage').textContent = helloData.message;
            } catch (e) {
                document.getElementById('statusDot').classList.add('offline');
                document.getElementById('statusText').textContent = 'Offline';
                document.getElementById('helloMessage').textContent = 'Unable to connect';
            }
        }

        async function testEndpoint(path, responseId) {
            const box = document.getElementById(responseId);
            box.classList.remove('error');
            box.classList.add('visible');
            box.textContent = 'Loading...';

            try {
                const start = performance.now();
                const res = await fetch(path);
                const duration = Math.round(performance.now() - start);
                const data = await res.json();
                box.textContent = `Status: ${res.status} | ${duration}ms\n${JSON.stringify(data, null, 2)}`;
            } catch (e) {
                box.classList.add('error');
                box.textContent = `Error: ${e.message}`;
            }
        }

        checkStatus();
    </script>
</body>

</html>
